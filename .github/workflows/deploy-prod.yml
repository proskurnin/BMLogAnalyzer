name: Deploy production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to deploy
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: bm-log-analyzer-prod
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Show Python version
        run: python3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-dev.txt -r requirements-web.txt

      - name: Run tests
        run: python3 -m pytest -q

  deploy_prod:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to production
        run: |
          DEPLOY_SHA="$(git rev-parse HEAD)"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'bash -s' <<EOF
          set -euo pipefail
          git config --global --add safe.directory /opt/bm-log-analyzer-prod/src
          cd /opt/bm-log-analyzer-prod/src
          git fetch origin "${DEPLOY_SHA}" --depth=1
          git reset --hard FETCH_HEAD
          .venv/bin/python -m pip install -r requirements-dev.txt -r requirements-web.txt
          .venv/bin/python -m pytest -q
          systemctl restart bm-log-analyzer-prod
          systemctl is-active --quiet bm-log-analyzer-prod
          EOF
