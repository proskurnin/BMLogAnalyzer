name: CI and stage deploy

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: bm-log-analyzer-stage
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -r requirements-web.txt

      - name: Run tests
        run: pytest -q

  deploy_stage:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to stage
        run: |
          DEPLOY_SHA="$(git rev-parse HEAD)"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'bash -s' <<EOF
          set -euo pipefail
          git config --global --add safe.directory /opt/bm-log-analyzer-stage/src
          cd /opt/bm-log-analyzer-stage/src
          git fetch origin "${DEPLOY_SHA}" --depth=1
          git reset --hard FETCH_HEAD
          .venv/bin/python -m pip install -r requirements-dev.txt -r requirements-web.txt
          .venv/bin/python -m pytest -q
          systemctl restart bm-log-analyzer-stage
          systemctl is-active --quiet bm-log-analyzer-stage
          EOF
