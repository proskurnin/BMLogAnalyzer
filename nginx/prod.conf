server {
    server_name bm.proskurnin.ru;

    client_max_body_size 2048m;
    client_body_timeout 120s;
    proxy_read_timeout  180s;
    proxy_send_timeout  120s;

    location / {
        proxy_pass         http://127.0.0.1:8011;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/bm-stage.proskurnin.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bm-stage.proskurnin.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = bm.proskurnin.ru) {
        return 301 https://$host$request_uri;
    }

    listen      80;
    server_name bm.proskurnin.ru;
    return      404;
}
