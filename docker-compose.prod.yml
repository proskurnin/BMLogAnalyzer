name: bm-log-analyzer-prod

services:
  app:
    build: .
    ports:
      - "127.0.0.1:8011:8000"
    env_file:
      - .env.prod
    environment:
      BM_APP_ENV: production
      BM_DATA_DIR: /app/_workdir
      BM_COOKIE_SECURE: "true"
    volumes:
      - ./logs:/app/logs
      - /var/lib/bm-log-analyzer-prod:/app/_workdir
    restart: unless-stopped
